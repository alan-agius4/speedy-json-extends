version: 2
jobs:
  build:
    docker:
      - image: circleci/node:16.3@sha256:d44a6df16de28e9ce664deb3cde0e46a06221cef194a918b35315157e77a2255
    steps:
      - checkout
      - restore_cache:
          key: speedy-{{ .Branch }}-{{ checksum "package.json" }}
      - run:
          name: Installing npm packages
          command: npm install
      - run: 
          name: Build
          command: npm run build
      - save_cache:
          key: speedy-{{ .Branch }}-{{ checksum "package.json" }}
          paths:
            - node_modules
  test:
    docker:
      - image: circleci/node:16.3@sha256:d44a6df16de28e9ce664deb3cde0e46a06221cef194a918b35315157e77a2255
    steps:
      - checkout
      - restore_cache:
          key: speedy-{{ .Branch }}-{{ checksum "package.json" }}
      - run:
          name: Installing npm packages
          command: npm install
      - run: 
          name: Test
          command: npm t
      - save_cache:
          key: speedy-{{ .Branch }}-{{ checksum "package.json" }}
          paths:
            - node_modules

workflows:
  version: 2
  default_workflow:
    jobs:
      - build
      - test